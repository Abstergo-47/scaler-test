name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - uses: actions/cache@v6
        with:
          path: ~/.npm
          key: ${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - run: npm test
      - run: npm run build

